name: Build Test

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: 1
  SCCACHE_GHA_ENABLED: true

jobs:
  build-sdl3:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"
      
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync SDL3
        run: python -u sync.py --sdl3

      - name: Build SDL3
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-vkbootstrap --skip-angle --skip-skia --skip-main

      - name: Upload SDL3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdl3-${{ inputs.build_type || 'Release' }}
          path: deps/SDL3/out/${{ inputs.build_type || 'Release' }}
          retention-days: 1

  build-vkbootstrap:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync vk-bootstrap
        run: python -u sync.py --vkbootstrap

      - name: Build vk-bootstrap
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-angle --skip-skia --skip-main

      - name: Upload vk-bootstrap artifact
        uses: actions/upload-artifact@v6
        with:
          name: vkbootstrap-${{ inputs.build_type || 'Release' }}
          path: deps/vk-bootstrap/out/${{ inputs.build_type || 'Release' }}
          retention-days: 1

  build-angle:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"
      
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync ANGLE
        run: python -u sync.py --angle

      - name: Build ANGLE
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-vkbootstrap --skip-skia --skip-main

      - name: Upload ANGLE artifact
        uses: actions/upload-artifact@v6
        with:
          name: angle-${{ inputs.build_type || 'Release' }}
          path: |
            deps/angle/out/${{ inputs.build_type || 'Release' }}
            !deps/angle/out/${{ inputs.build_type || 'Release' }}/**/*.obj
          retention-days: 1

  build-skia:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync Skia
        run: python -u sync.py --skia

      - name: Build Skia
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-vkbootstrap --skip-angle --skip-main

      - name: Upload Skia artifact
        uses: actions/upload-artifact@v6
        with:
          name: skia-${{ inputs.build_type || 'Release' }}
          path: |
            deps/skia/out/${{ inputs.build_type || 'Release' }}
            !deps/skia/out/${{ inputs.build_type || 'Release' }}/**/*.obj
            !deps/skia/out/${{ inputs.build_type || 'Release' }}/**/*.pdb
          retention-days: 1

  build-main:
    runs-on: windows-latest
    needs: [build-sdl3, build-vkbootstrap, build-angle, build-skia]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync dependencies (headers only)
        run: python -u sync.py --headers-only

      - name: Download SDL3 artifact
        uses: actions/download-artifact@v4
        with:
          name: sdl3-${{ inputs.build_type || 'Release' }}
          path: deps/SDL3/out/${{ inputs.build_type || 'Release' }}

      - name: Download vk-bootstrap artifact
        uses: actions/download-artifact@v4
        with:
          name: vkbootstrap-${{ inputs.build_type || 'Release' }}
          path: deps/vk-bootstrap/out/${{ inputs.build_type || 'Release' }}

      - name: Download ANGLE artifact
        uses: actions/download-artifact@v4
        with:
          name: angle-${{ inputs.build_type || 'Release' }}
          path: deps/angle/out/${{ inputs.build_type || 'Release' }}

      - name: Download Skia artifact
        uses: actions/download-artifact@v4
        with:
          name: skia-${{ inputs.build_type || 'Release' }}
          path: deps/skia/out/${{ inputs.build_type || 'Release' }}

      - name: Build main project
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-deps

      - name: Show sccache stats
        run: $env:SCCACHE_PATH --show-stats

      - name: Package artifact
        id: package
        run: |
          $version = Get-Content VERSION
          $buildType = "${{ inputs.build_type || 'Release' }}"
          $zipName = "skia-renderer-v$version-windows-x64-$buildType.zip"

          # Create package directory
          New-Item -ItemType Directory -Force -Path package

          # Copy executable
          Copy-Item build/$buildType/skia-renderer.exe package/

          # Copy DLLs
          Copy-Item deps/SDL3/out/$buildType/SDL3.dll package/
          Copy-Item deps/angle/out/$buildType/libEGL.dll package/
          Copy-Item deps/angle/out/$buildType/libGLESv2.dll package/

          # Create zip
          Compress-Archive -Path package/* -DestinationPath $zipName

          # Calculate hash
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash

          # Get file size
          $size = (Get-Item $zipName).Length / 1MB

          echo "artifact_name=$zipName" >> $env:GITHUB_OUTPUT
          echo "artifact_hash=$hash" >> $env:GITHUB_OUTPUT
          echo "artifact_size=$([math]::Round($size, 2))" >> $env:GITHUB_OUTPUT

          Write-Host "Package created: $zipName"
          Write-Host "Size: $([math]::Round($size, 2)) MB"
          Write-Host "SHA256: $hash"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ inputs.build_type || 'Release' }}
          path: ${{ steps.package.outputs.artifact_name }}
          retention-days: 7

      - name: Summary
        run: |
          echo "### Build Test Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Build Type**: `${{ inputs.build_type || 'Release' }}`" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Artifact**: `${{ steps.package.outputs.artifact_name }}`" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Size**: `${{ steps.package.outputs.artifact_size }} MB`" >> $env:GITHUB_STEP_SUMMARY
          echo "- **SHA256**: `${{ steps.package.outputs.artifact_hash }}`" >> $env:GITHUB_STEP_SUMMARY

name: Build Test

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: 1
  SCCACHE_GHA_ENABLED: true

jobs:
  build-sdl3:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync SDL3
        run: python -u sync.py --sdl3

      - name: Build SDL3
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-vkbootstrap --skip-angle --skip-skia --skip-main

      - name: Upload SDL3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdl3-${{ inputs.build_type || 'Release' }}
          path: deps/SDL3/
          retention-days: 1

  build-vkbootstrap:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync vk-bootstrap
        run: python -u sync.py --vkbootstrap

      - name: Build vk-bootstrap
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-angle --skip-skia --skip-main

      - name: Upload vk-bootstrap artifact
        uses: actions/upload-artifact@v6
        with:
          name: vkbootstrap-${{ inputs.build_type || 'Release' }}
          path: deps/vk-bootstrap/
          retention-days: 1

  build-angle:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"
      
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync ANGLE
        run: python -u sync.py --angle

      - name: Build ANGLE
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-vkbootstrap --skip-skia --skip-main

      - name: Upload ANGLE artifact
        uses: actions/upload-artifact@v6
        with:
          name: angle-${{ inputs.build_type || 'Release' }}
          path: |
            deps/angle/
          retention-days: 1

  build-skia:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync Skia
        run: python -u sync.py --skia

      - name: Build Skia
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-vkbootstrap --skip-angle --skip-main

      - name: Upload Skia artifact
        uses: actions/upload-artifact@v6
        with:
          name: skia-${{ inputs.build_type || 'Release' }}
          path: |
            deps/skia/
          retention-days: 1

  build-main:
    runs-on: windows-latest
    needs: [build-sdl3, build-vkbootstrap, build-angle, build-skia]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Download SDL3 artifact
        uses: actions/download-artifact@v8
        with:
          name: sdl3-${{ inputs.build_type || 'Release' }}
          path: deps/SDL3/

      - name: Download vk-bootstrap artifact
        uses: actions/download-artifact@v8
        with:
          name: vkbootstrap-${{ inputs.build_type || 'Release' }}
          path: deps/vk-bootstrap/

      - name: Download ANGLE artifact
        uses: actions/download-artifact@v8
        with:
          name: angle-${{ inputs.build_type || 'Release' }}
          path: deps/angle/

      - name: Download Skia artifact
        uses: actions/download-artifact@v8
        with:
          name: skia-${{ inputs.build_type || 'Release' }}
          path: deps/skia

      - name: Build main project
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-deps

      - name: Show sccache stats
        run: $env:SCCACHE_PATH --show-stats

      - name: Package artifact
        id: package
        shell: powershell
        run: |
          $version = Get-Content VERSION
          $buildType = "${{ inputs.build_type || 'Release' }}"
          $zipName = "skia-renderer-v$version-windows-x64-$buildType.zip"
          $pkgDir = "package"
          
          if (Test-Path $pkgDir) { Remove-Item -Recurse -Force $pkgDir }
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null

          $dllSourceDirs = @(
            "deps/SDL3/out/$buildType",
            "deps/angle/out/$buildType"
          )

          $exeSource = "build/$buildType/skia-renderer.exe"
          if (Test-Path $exeSource) {
            Copy-Item $exeSource -Destination $pkgDir/
          } else {
            Write-Error "Executable not found at $exeSource"
            exit 1
          }

          foreach ($dir in $dllSourceDirs) {
            if (Test-Path $dir) {
              Write-Host "Collecting DLLs from $dir..."
              Get-ChildItem -Path $dir -Filter "*.dll" | Copy-Item -Destination $pkgDir/ -Force
            } else {
              Write-Warning "Dependency directory not found: $dir"
            }
          }

          if ((Get-ChildItem $pkgDir).Count -eq 0) {
            Write-Error "Packaging failed: Package directory is empty."
            exit 1
          }

          Compress-Archive -Path "$pkgDir/*" -DestinationPath $zipName
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          $size = [math]::Round((Get-Item $zipName).Length / 1MB, 2)

          echo "artifact_name=$zipName" >> $env:GITHUB_OUTPUT
          echo "artifact_hash=$hash" >> $env:GITHUB_OUTPUT
          echo "artifact_size=$size" >> $env:GITHUB_OUTPUT

          Write-Host "Package created: $zipName ($size MB)"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ inputs.build_type || 'Release' }}
          path: ${{ steps.package.outputs.artifact_name }}
          retention-days: 7

      - name: Summary
        run: |
          echo "### Build Test Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Build Type**: `${{ inputs.build_type || 'Release' }}`" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Artifact**: `${{ steps.package.outputs.artifact_name }}`" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Size**: `${{ steps.package.outputs.artifact_size }} MB`" >> $env:GITHUB_STEP_SUMMARY
          echo "- **SHA256**: `${{ steps.package.outputs.artifact_hash }}`" >> $env:GITHUB_STEP_SUMMARY

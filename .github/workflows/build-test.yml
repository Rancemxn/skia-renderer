name: Build Test

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: 1
  SCCACHE_GHA_ENABLED: true

jobs:
  build-sdl3:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM
        uses: egor-tensin/setup-clang@v2

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync SDL3
        run: python -u sync.py --sdl3

      - name: Build SDL3
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-vkbootstrap --skip-angle --skip-skia --skip-main

      - name: Upload SDL3 artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdl3-${{ inputs.build_type || 'Release' }}
          path: deps/SDL3/out/${{ inputs.build_type || 'Release' }}
          retention-days: 1

  build-vkbootstrap:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM
        uses: egor-tensin/setup-clang@v2

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync vk-bootstrap
        run: python -u sync.py --vkbootstrap

      - name: Build vk-bootstrap
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-angle --skip-skia --skip-main

      - name: Upload vk-bootstrap artifact
        uses: actions/upload-artifact@v6
        with:
          name: vkbootstrap-${{ inputs.build_type || 'Release' }}
          path: deps/vk-bootstrap/out/${{ inputs.build_type || 'Release' }}
          retention-days: 1

  build-angle:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM
        uses: egor-tensin/setup-clang@v2
      
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync ANGLE
        run: python -u sync.py --angle

      - name: Build ANGLE
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-vkbootstrap --skip-skia --skip-main

      - name: Upload ANGLE artifact
        uses: actions/upload-artifact@v6
        with:
          name: angle-${{ inputs.build_type || 'Release' }}
          path: |
            deps/angle/out/${{ inputs.build_type || 'Release' }}
          retention-days: 1

  build-skia:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM
        uses: egor-tensin/setup-clang@v2

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync Skia
        run: python -u sync.py --skia

      - name: Build Skia
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-sdl --skip-vkbootstrap --skip-angle --skip-main

      - name: Upload Skia artifact
        uses: actions/upload-artifact@v6
        with:
          name: skia-${{ inputs.build_type || 'Release' }}
          path: |
            deps/skia/out/${{ inputs.build_type || 'Release' }}
          retention-days: 1

  build-main:
    runs-on: windows-latest
    needs: [build-sdl3, build-vkbootstrap, build-angle, build-skia]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache server startup timeout
        run: |
          $configDir = "$env:APPDATA\Mozilla\sccache\config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          Set-Content -Path "$configDir\config" -Value "server_startup_timeout_ms = 30000"
          Write-Host "sccache config created at $configDir\config"

      - name: Install LLVM
        uses: egor-tensin/setup-clang@v2

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Sync dependencies
        run: python -u sync.py

      - name: Download SDL3 artifact
        uses: actions/download-artifact@v8
        with:
          name: sdl3-${{ inputs.build_type || 'Release' }}
          path: deps/SDL3/out/${{ inputs.build_type || 'Release' }}

      - name: Download vk-bootstrap artifact
        uses: actions/download-artifact@v8
        with:
          name: vkbootstrap-${{ inputs.build_type || 'Release' }}
          path: deps/vk-bootstrap/out/${{ inputs.build_type || 'Release' }}

      - name: Download ANGLE artifact
        uses: actions/download-artifact@v8
        with:
          name: angle-${{ inputs.build_type || 'Release' }}
          path: deps/angle/out/${{ inputs.build_type || 'Release' }}

      - name: Download Skia artifact
        uses: actions/download-artifact@v8
        with:
          name: skia-${{ inputs.build_type || 'Release' }}
          path: deps/skia/out/${{ inputs.build_type || 'Release' }}

      - name: Build main project
        run: python -u build.py --build-type ${{ inputs.build_type || 'Release' }} --skip-deps

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-${{ inputs.build_type || 'Release' }}
          path: build\Release
          retention-days: 7
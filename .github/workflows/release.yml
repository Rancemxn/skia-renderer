name: Version & Release

on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'VERSION'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      bump_major:
        description: 'Bump major version (e.g., 2.0.x -> 3.0.0)'
        required: false
        default: 'false'
        type: boolean
      bump_minor:
        description: 'Bump minor version (e.g., 2.0.x -> 2.1.0)'
        required: false
        default: 'false'
        type: boolean
      draft:
        description: 'Create as draft release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current_version
        run: |
          # VERSION file format: "MAJOR_MINOR BUILD_NUMBER"
          # Example: "20 235" means v2.0.235
          # MAJOR_MINOR = MAJOR * 10 + MINOR (e.g., 20 = 2.0, 14 = 1.4)
          read MAJOR_MINOR BUILD_NUMBER < VERSION
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          
          # Parse MAJOR and MINOR from MAJOR_MINOR
          MAJOR=$((MAJOR_MINOR / 10))
          MINOR=$((MAJOR_MINOR % 10))
          echo "current_version=${MAJOR}.${MINOR}.${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "Current VERSION file: $MAJOR_MINOR $BUILD_NUMBER (v${MAJOR}.${MINOR}.${BUILD_NUMBER})"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT_MAJOR_MINOR=${{ steps.current_version.outputs.major_minor }}
          CURRENT_BUILD=${{ steps.current_version.outputs.build_number }}
          
          # ALWAYS increment BUILD_NUMBER (represents commit count)
          NEW_BUILD=$((CURRENT_BUILD + 1))
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.bump_major }}" = "true" ]; then
              # Bump major: MAJOR_MINOR + 10 (BUILD still increments)
              NEW_MAJOR_MINOR=$((CURRENT_MAJOR_MINOR + 10))
            elif [ "${{ inputs.bump_minor }}" = "true" ]; then
              # Bump minor: MAJOR_MINOR + 1 (BUILD still increments)
              NEW_MAJOR_MINOR=$((CURRENT_MAJOR_MINOR + 1))
            else
              NEW_MAJOR_MINOR=$CURRENT_MAJOR_MINOR
            fi
          else
            # Push trigger: only bump BUILD_NUMBER
            NEW_MAJOR_MINOR=$CURRENT_MAJOR_MINOR
          fi
          
          # Parse final version
          NEW_MAJOR=$((NEW_MAJOR_MINOR / 10))
          NEW_MINOR=$((NEW_MAJOR_MINOR % 10))
          NEW_TAG="v${NEW_MAJOR}.${NEW_MINOR}.${NEW_BUILD}"
          
          echo "new_major_minor=$NEW_MAJOR_MINOR" >> $GITHUB_OUTPUT
          echo "new_build=$NEW_BUILD" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new_version=${NEW_MAJOR}.${NEW_MINOR}.${NEW_BUILD}" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG (MAJOR_MINOR=$NEW_MAJOR_MINOR, BUILD=$NEW_BUILD)"

      - name: Update VERSION and commit on develop
        run: |
          echo "${{ steps.new_version.outputs.new_major_minor }} ${{ steps.new_version.outputs.new_build }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.new_tag }}"
          git push origin develop

      # Release steps (only for workflow_dispatch)
      - name: Merge develop into main
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch origin main:main
          git checkout main
          git merge develop --no-ff -m "chore: merge develop for release ${{ steps.new_version.outputs.new_tag }}"
          git push origin main

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag -a ${{ steps.new_version.outputs.new_tag }} -m "Release ${{ steps.new_version.outputs.new_tag }}

          Version: ${{ steps.new_version.outputs.new_version }}
          Created: $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin ${{ steps.new_version.outputs.new_tag }}

      - name: Sync develop branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          git checkout develop
          git merge main -m "chore: sync with main after release ${{ steps.new_version.outputs.new_tag }}"
          git push origin develop

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFT_FLAG=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          
          gh release create ${{ steps.new_version.outputs.new_tag }} \
            --title "Release ${{ steps.new_version.outputs.new_tag }}" \
            --notes "## Release ${{ steps.new_version.outputs.new_tag }}

          **Version Number:** ${{ steps.new_version.outputs.new_version }}

          **Changes since last release:**
          \`\`\`
          $(git log $(git describe --tags --abbrev=0 ${{ steps.new_version.outputs.new_tag }}^)..${{ steps.new_version.outputs.new_tag }} --oneline 2>/dev/null || echo "Initial release")
          \`\`\`
          " \
            $DRAFT_FLAG

      - name: Summary
        run: |
          echo "## ${{ github.event_name == 'workflow_dispatch' && 'Release Summary' || 'Version Bump' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Previous Version | ${{ steps.current_version.outputs.current_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ steps.new_version.outputs.new_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| VERSION File | ${{ steps.new_version.outputs.new_major_minor }} ${{ steps.new_version.outputs.new_build }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "| Tag | ${{ steps.new_version.outputs.new_tag }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Draft | ${{ inputs.draft }} |" >> $GITHUB_STEP_SUMMARY
          fi

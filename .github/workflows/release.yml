name: Release

on:
  workflow_dispatch:
    inputs:
      bump_major:
        description: 'Bump major version (e.g., 1.x.x -> 2.0.0)'
        required: false
        default: 'false'
        type: boolean
      bump_minor:
        description: 'Bump minor version (e.g., 1.2.x -> 1.3.0)'
        required: false
        default: 'false'
        type: boolean
      draft:
        description: 'Create as draft release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current_version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Calculate new version
        id: new_version
        run: |
          # Find the latest semantic version tag (vMAJOR.MINOR.PATCH)
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          echo "Latest tag: ${LATEST_TAG:-none}"

          if [ -z "$LATEST_TAG" ]; then
            # No existing tags, start with v1.0.0
            CURRENT_MAJOR=0
            CURRENT_MINOR=0
            CURRENT_PATCH=0
          else
            # Parse current version from tag
            CURRENT_MAJOR=$(echo $LATEST_TAG | cut -d. -f1 | tr -d 'v')
            CURRENT_MINOR=$(echo $LATEST_TAG | cut -d. -f2)
            CURRENT_PATCH=$(echo $LATEST_TAG | cut -d. -f3)
          fi

          echo "Current: MAJOR=$CURRENT_MAJOR, MINOR=$CURRENT_MINOR, PATCH=$CURRENT_PATCH"

          if [ "${{ inputs.bump_major }}" = "true" ]; then
            # Bump major: MAJOR+1, MINOR=0, PATCH=0
            NEW_MAJOR=$((CURRENT_MAJOR + 1))
            NEW_MINOR=0
            NEW_PATCH=0
          elif [ "${{ inputs.bump_minor }}" = "true" ]; then
            # Bump minor: MAJOR unchanged, MINOR+1, PATCH=0
            NEW_MAJOR=$CURRENT_MAJOR
            NEW_MINOR=$((CURRENT_MINOR + 1))
            NEW_PATCH=0
          else
            # Bump patch (default): MAJOR unchanged, MINOR unchanged, PATCH+1
            NEW_MAJOR=$CURRENT_MAJOR
            NEW_MINOR=$CURRENT_MINOR
            NEW_PATCH=$((CURRENT_PATCH + 1))
          fi

          NEW_TAG="v${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          NEW_VERSION_STRING="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"

          echo "new_version=${NEW_VERSION_STRING}" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New tag: $NEW_TAG (MAJOR=$NEW_MAJOR, MINOR=$NEW_MINOR, PATCH=$NEW_PATCH)"

      - name: Update VERSION and commit on develop
        run: |
          echo "${{ steps.new_version.outputs.new_version }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.new_version }}"
          git push origin develop

      - name: Merge develop into main
        run: |
          git fetch origin main:main
          git checkout main
          git merge develop --no-ff -m "chore: merge develop for release ${{ steps.new_version.outputs.new_tag }}"
          git push origin main

      - name: Create tag
        run: |
          git tag -a ${{ steps.new_version.outputs.new_tag }} -m "Release ${{ steps.new_version.outputs.new_tag }}

          Version: ${{ steps.new_version.outputs.new_version }}
          Created: $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin ${{ steps.new_version.outputs.new_tag }}

      - name: Sync develop branch
        run: |
          git checkout develop
          git merge main -m "chore: sync with main after release ${{ steps.new_version.outputs.new_tag }}"
          git push origin develop

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFT_FLAG=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          
          gh release create ${{ steps.new_version.outputs.new_tag }} \
            --title "Release ${{ steps.new_version.outputs.new_tag }}" \
            --notes "## Release ${{ steps.new_version.outputs.new_tag }}

          **Version Number:** ${{ steps.new_version.outputs.new_version }}

          **Changes since last release:**
          \`\`\`
          $(git log $(git describe --tags --abbrev=0 ${{ steps.new_version.outputs.new_tag }}^)..${{ steps.new_version.outputs.new_tag }} --oneline 2>/dev/null || echo "Initial release")
          \`\`\`
          " \
            $DRAFT_FLAG

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Previous Version | ${{ steps.current_version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | ${{ steps.new_version.outputs.new_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ steps.new_version.outputs.new_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Draft | ${{ inputs.draft }} |" >> $GITHUB_STEP_SUMMARY

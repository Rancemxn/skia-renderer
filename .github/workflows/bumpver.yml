name: Version Bumper

on:
  push:
    branches:
      - develop
    paths-ignore:
      - 'VERSION'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      bump_major:
        description: 'Bump major version'
        required: false
        type: boolean
      bump_minor:
        description: 'Bump minor version'
        required: false
        type: boolean
      prerelease:
        description: 'Create as pre-release'
        required: false
        type: boolean
      skip_build:
        description: 'Skip Windows build (for testing)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ========================================
  # Job 1: Version Management
  # ========================================
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.new_version.outputs.new_version }}
      is_release: ${{ steps.new_version.outputs.is_release }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current_version
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$(cat VERSION)"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: new_version
        run: |
          MAJOR=${{ steps.current_version.outputs.major }}
          MINOR=${{ steps.current_version.outputs.minor }}
          PATCH=${{ steps.current_version.outputs.patch }}
          IS_RELEASE=false
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.bump_major }}" = "true" ] || [ "${{ inputs.bump_minor }}" = "true" ]; then
              IS_RELEASE=true
            fi

            if [ "${{ inputs.bump_major }}" = "true" ]; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif [ "${{ inputs.bump_minor }}" = "true" ]; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
          else
            PATCH=$((PATCH + 1))
          fi
          
          echo "new_version=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT

      - name: Update VERSION and commit
        run: |
          echo "${{ steps.new_version.outputs.new_version }}" > VERSION
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.new_version.outputs.new_version }}"
          git push origin develop

      - name: Summary
        run: |
          echo "### Version Bump Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ steps.new_version.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          ACTION_TYPE="Build"
          if [ "${{ steps.new_version.outputs.is_release }}" = "true" ]; then
            ACTION_TYPE="Release"
          fi
          echo "- **Action**: \`${ACTION_TYPE}\`" >> $GITHUB_STEP_SUMMARY

  # ========================================
  # Job 2: Build Windows Release
  # ========================================
  build-windows:
    needs: version-bump
    if: needs.version-bump.outputs.is_release == 'true' && inputs.skip_build != true
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: 1
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------
      # Setup Build Tools
      # ----------------------------------------
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install LLVM and Clang 20
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ----------------------------------------
      # Verify Environment
      # ----------------------------------------
      - name: Verify build environment
        run: |
          clang-cl --version
          cmake --version
          ninja --version
          python --version
          echo "VULKAN_SDK: $env:VULKAN_SDK"
          echo "SCCACHE_PATH: $env:SCCACHE_PATH"

      # ----------------------------------------
      # Sync Dependencies
      # ----------------------------------------
      - name: Sync dependencies
        run: python -u sync.py -v
        timeout-minutes: 30
        env:
          SCCACHE_GHA_ENABLED: "true"

      # ----------------------------------------
      # Build Release
      # ----------------------------------------
      - name: Build Release
        run: python -u build.py --build-type Release
        timeout-minutes: 120
        env:
          SCCACHE_GHA_ENABLED: "true"

      # ----------------------------------------
      # Show sccache stats
      # ----------------------------------------
      - name: Show sccache stats
        run: $env:SCCACHE_PATH --show-stats

      # ----------------------------------------
      # Package Artifacts
      # ----------------------------------------
      - name: Package Release
        id: package
        run: |
          $version = Get-Content VERSION
          $zipName = "skia-renderer-v$version-windows-x64.zip"
          
          # Create package directory
          New-Item -ItemType Directory -Force -Path package
          
          # Copy executable
          Copy-Item build/Release/skia-renderer.exe package/
          
          # Copy SDL3 DLL
          Copy-Item deps/SDL3/out/Release/SDL3.dll package/
          
          # Copy ANGLE DLLs
          Copy-Item deps/angle/out/Release/libEGL.dll package/
          Copy-Item deps/angle/out/Release/libGLESv2.dll package/
          
          # Create README
          @"
          Skia Renderer v$version
          ======================
          
          A cross-backend rendering engine using Google Skia.
          
          Supported backends:
          - Vulkan (Graphite)
          - OpenGL (Ganesh)
          - ANGLE (OpenGL ES)
          - Direct3D 12 (Windows only)
          
          Requirements:
          - Windows 10/11 64-bit
          - Vulkan-capable GPU (for Vulkan backend)
          - OpenGL 3.3+ GPU (for OpenGL backend)
          
          Usage:
          - Double-click skia-renderer.exe to run with default settings
          - Run 'skia-renderer.exe --help' for command line options
          - Use '--backend vulkan|opengl|angle|d3d12' to select backend
          
          DLLs included:
          - SDL3.dll: Window and input handling
          - libEGL.dll, libGLESv2.dll: ANGLE OpenGL ES implementation
          "@ | Out-File -FilePath package/README.txt -Encoding UTF8
          
          # Create zip
          Compress-Archive -Path package/* -DestinationPath $zipName
          
          # Calculate hash
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash
          
          echo "artifact_name=$zipName" >> $env:GITHUB_OUTPUT
          echo "artifact_hash=$hash" >> $env:GITHUB_OUTPUT
          
          Write-Host "Package created: $zipName"
          Write-Host "SHA256: $hash"

      # ----------------------------------------
      # Upload Artifact
      # ----------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ steps.package.outputs.artifact_name }}
          retention-days: 7

      - name: Summary
        run: |
          echo "### Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Artifact**: `${{ steps.package.outputs.artifact_name }}`" >> $env:GITHUB_STEP_SUMMARY
          echo "- **SHA256**: `${{ steps.package.outputs.artifact_hash }}`" >> $env:GITHUB_STEP_SUMMARY

  # ========================================
  # Job 3: Create Release
  # ========================================
  create-release:
    needs: [version-bump, build-windows]
    if: needs.version-bump.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: ./artifacts

      - name: Release process
        run: |
          TAG="v${{ needs.version-bump.outputs.new_version }}"
          
          rollback() {
            echo "::error::Release process failed. Rolling back..."
            git checkout develop
            git tag -d $TAG || true
            git push origin :$TAG || true
            exit 1
          }
          trap rollback ERR

          git fetch origin main:main
          git checkout main
          git merge develop --no-ff -m "chore: merge develop for release $TAG"
          git push origin main
          
          git tag -a $TAG -m "Release $TAG"
          git push origin $TAG
          
          git checkout develop
          git merge main -m "chore: sync with main after release $TAG"
          git push origin develop

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.new_version }}
          name: Release ${{ needs.version-bump.outputs.new_version }}
          body: |
            ## Skia Renderer v${{ needs.version-bump.outputs.new_version }}
            
            ### Downloads
            
            | Platform | Artifact |
            |----------|----------|
            | Windows x64 | `skia-renderer-v${{ needs.version-bump.outputs.new_version }}-windows-x64.zip` |
            
            ### Supported Backends
            - Vulkan (Graphite)
            - OpenGL (Ganesh)
            - ANGLE (OpenGL ES)
            - Direct3D 12 (Windows only)
            
            ### Requirements
            - Windows 10/11 64-bit
            - Vulkan-capable GPU (for Vulkan backend)
            - OpenGL 3.3+ GPU (for OpenGL backend)
          prerelease: ${{ inputs.prerelease == 'true' }}
          files: artifacts/skia-renderer-v${{ needs.version-bump.outputs.new_version }}-windows-x64.zip

      - name: Summary
        run: |
          echo "### Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`v${{ needs.version-bump.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: [v${{ needs.version-bump.outputs.new_version }}](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version-bump.outputs.new_version }})" >> $GITHUB_STEP_SUMMARY
